name: Validate customer skills

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  contract-hardening:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate skill contracts
        run: python -m unittest discover -s tests -v
